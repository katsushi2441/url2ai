openapi: 3.0.3
info:
  title: llm2api
  description: OpenAI-compatible LLM API powered by Gemma 4 E4B via Ollama. Send chat completions requests and get fast, cost-effective AI responses.
  version: 1.0.0
servers:
  - url: http://exbridge.ddns.net:8018
paths:
  /v1/chat/completions:
    post:
      summary: Chat Completions
      description: Generate a chat completion response (OpenAI-compatible format).
      operationId: chatCompletions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - messages
              properties:
                messages:
                  type: array
                  items:
                    type: object
                    required:
                      - role
                      - content
                    properties:
                      role:
                        type: string
                        enum: [system, user, assistant]
                      content:
                        type: string
                temperature:
                  type: number
                  minimum: 0
                  maximum: 2
                  default: 0.7
                max_tokens:
                  type: integer
                  minimum: 1
                  maximum: 2048
                  default: 512
            example:
              messages:
                - role: user
                  content: Hello, how are you?
              temperature: 0.7
              max_tokens: 512
      responses:
        "200":
          description: Successful completion
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                  created:
                    type: integer
                  model:
                    type: string
                  choices:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                        message:
                          type: object
                          properties:
                            role:
                              type: string
                            content:
                              type: string
                        finish_reason:
                          type: string
                  usage:
                    type: object
                    properties:
                      prompt_tokens:
                        type: integer
                      completion_tokens:
                        type: integer
                      total_tokens:
                        type: integer
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "403":
          description: Forbidden
        "502":
          description: Upstream Ollama unavailable
  /v1/models:
    get:
      summary: List Models
      description: Returns the available model.
      operationId: listModels
      responses:
        "200":
          description: Model list
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        object:
                          type: string
