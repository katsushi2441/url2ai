openapi: 3.0.3
info:
  title: llm2api
  description: OpenAI-compatible LLM API powered by Gemma 4 12B via Ollama. Send chat completions requests and get fast, cost-effective AI responses.
  version: 1.0.0
servers:
  - url: http://exbridge.ddns.net:8018
paths:
  /trade/risk-check:
    post:
      summary: Crypto Token Risk Check
      description: Scans recent news for hack / exploit / delisting / rug-pull / lawsuit events for a crypto symbol and returns a block/ok verdict with classified evidence. Powered by the same pipeline that protects the live Kurage FreqAI trading system.
      operationId: tradeRiskCheck
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [symbol]
              properties:
                symbol:
                  type: string
                  example: BTC
                  description: Base symbol (2-15 alphanumeric chars)
      responses:
        '200':
          description: Risk verdict with classified news events
  /trade/size-check:
    post:
      summary: Crypto Order Size / Liquidity Check
      description: Checks an order size against 24h traded volume (0.1% liquidity cap rule from the live Kurage FreqAI system) and returns the max safe size plus a thin-market warning. No LLM, sub-second.
      operationId: tradeSizeCheck
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [symbol, order_size_usdt]
              properties:
                symbol:
                  type: string
                  example: DOGE
                order_size_usdt:
                  type: number
                  example: 5000
      responses:
        '200':
          description: Liquidity verdict with max safe size
  /v1/chat/completions:
    post:
      summary: Chat Completions
      description: Generate a chat completion response (OpenAI-compatible format).
      operationId: chatCompletions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - messages
              properties:
                messages:
                  type: array
                  items:
                    type: object
                    required:
                      - role
                      - content
                    properties:
                      role:
                        type: string
                        enum: [system, user, assistant]
                      content:
                        type: string
                temperature:
                  type: number
                  minimum: 0
                  maximum: 2
                  default: 0.7
                max_tokens:
                  type: integer
                  minimum: 1
                  maximum: 2048
                  default: 512
            example:
              messages:
                - role: user
                  content: Hello, how are you?
              temperature: 0.7
              max_tokens: 512
      responses:
        "200":
          description: Successful completion
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                  created:
                    type: integer
                  model:
                    type: string
                  choices:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                        message:
                          type: object
                          properties:
                            role:
                              type: string
                            content:
                              type: string
                        finish_reason:
                          type: string
                  usage:
                    type: object
                    properties:
                      prompt_tokens:
                        type: integer
                      completion_tokens:
                        type: integer
                      total_tokens:
                        type: integer
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "403":
          description: Forbidden
        "502":
          description: Upstream Ollama unavailable
  /v1/models:
    get:
      summary: List Models
      description: Returns the available model.
      operationId: listModels
      responses:
        "200":
          description: Model list
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        object:
                          type: string
