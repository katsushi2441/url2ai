server {
    listen 80;
    listen [::]:80;
    server_name exbridge.ddns.net;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host:8012$request_uri;
    }
}

server {
    listen 8012 ssl http2;
    listen [::]:8012 ssl http2;
    server_name exbridge.ddns.net;

    ssl_certificate /etc/letsencrypt/live/exbridge.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/exbridge.ddns.net/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    client_max_body_size 20M;

    location /mcp {
        proxy_pass http://127.0.0.1:8013/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
